<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KINDpos</title>

  <!-- Google Fonts — Outfit + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ──────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #383c42;  /* T.bg — no flash before JS loads */
    }

    /* ── Terminal shell ─────────────────────────── */
    #terminal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background: #383c42;
    }

    /* ── Header bar ─────────────────────────────── */
    #header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 42px;           /* T.headerH */
      z-index: 5;
      background: #2c2f34;    /* T.well */
      border-bottom: 1px solid #5a5f66;  /* T.border */
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }

    /* ── Layer stack ────────────────────────────── */
    #layer-working,
    #layer-transactional,
    #layer-interrupt,
    #layer-gate,
    #order-summary {
      position: absolute;
      pointer-events: none;
    }

    /* Working — main scene canvas */
    #layer-working {
      z-index: 10;
    }

    /* Transactional — overlays */
    #layer-transactional {
      z-index: 20;
    }

    /* Summary — order panel, left column */
    #order-summary {
      z-index: 25;
      display: none;
      flex-direction: column;
    }

    /* Interrupt — blocks all input */
    #layer-interrupt {
      z-index: 30;
    }

    /* Gate — full screen (login) */
    #layer-gate {
      z-index: 100;
      pointer-events: none;
    }

    /* ── Layer transitions ──────────────────────── */
    .layer-transactional-enter {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* ── Global touch/select ────────────────────── */
    button {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    /* ── Scrollbar — minimal, themed ───────────── */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #5a5f66;
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #86efac;
    }
  </style>
</head>
<body>

  <div id="terminal">

    <!-- Header bar — hidden on login, scenes can show it via SceneManager -->
    <div id="header" style="display:none;"></div>

    <!-- Layer stack — SceneManager owns these -->
    <div id="layer-working"></div>
    <div id="layer-transactional"></div>
    <div id="order-summary"></div>
    <div id="layer-interrupt"></div>
    <div id="layer-gate"></div>

  </div>

  <!-- Entry point -->
  <script type="module" src="./app.js"></script>

</body>
</html>
