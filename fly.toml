app = 'kindpos-vz2'
primary_region = 'ord'

[build]

[env]
  KINDPOS_DATABASE_PATH = '/data/event_ledger.db'
  KINDPOS_DEBUG = 'false'
  KINDPOS_STORE_MODE = 'live'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'kindpos_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
